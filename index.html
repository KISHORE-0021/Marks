<!DOCTYPE html>
<html>

<head>
  <title>time table</title>
  <style>
       @keyframes hi{
            20%{color: red;}
              25%{color: rgb(0, 0, 0);}
                50%{color: rgb(0, 255, 76);}
                  75%{color: rgb(0, 0, 0);}
                    100%{color: rgb(0, 238, 255);}
        }
    table {
      background-color: black;
      background-position: center;
      background-size: cover;
      animation-duration: 40ms;
    }
  </style>
</head>
<marquee behavior="" direction="">
<body>
  <center>
    <table border="10" style="border-color: rgba(7, 168, 255, 0.9);font-size: 40px;font-style: italic; box-shadow: 0px 0px 15px black;">
      <tr>
        <td style=" animation: hi 6s infinite;"> NAME</td>
        <td style="animation: hi 6s infinite;">TAMIL </td>

        <td style="animation: hi 6s infinite;"></td>
        <td style="animation: hi 6s infinite;">ENGLISH</td>
    
        <td style="animation: hi 6s infinite;">MATHS</td>
        <td style="animation: hi 6s infinite;">C++</td>
      </tr>
      <tr>
        <td style="animation: hi 6s infinite;">OBITO</td>

        <td colspan="2" style="animation: hi 6s infinite;">80</td>


        <td style="animation: hi 6s infinite;">70</td>
        <td style="animation: hi 6s infinite;">60</td>
        <td style="animation: hi 6s infinite;">80</td>
      </tr>
      <tr>
        <td style="animation: hi 6s infinite;">ITACHI</td>
        <td colspan="2" style="animation: hi 6s infinite;">80</td>

        <td style="animation: hi 6s infinite;">90</td>
        <td style="animation: hi 6s infinite;">50</td>
        <td style="animation: hi 6s infinite;">90</td>
      </tr>
      <tr>
        <td style="animation: hi 6s infinite;">NARUTO</td>
        <td colspan="2" style="animation: hi 6s infinite;">80</td>

        <td style="animation: hi 6s infinite;">79</td>
        <td style="animation: hi 6s infinite;">50</td>
        <td style="animation: hi 6s infinite;">40</td>
      </tr>

      <tr>
        <td style="animation: hi 6s infinite;">UCHIHA</td>
        <td colspan="2" style="animation: hi 6s infinite;">80</td>

        <td style="animation: hi 6s infinite;">50</td>
        <td style="animation: hi 6s infinite;">80</td>
        <td style="animation: hi 6s infinite;">50</td>
      </tr>
      <tr>
        <td style="animation: hi 6s infinite;">RIN</td>
        <td colspan="2" style="animation: hi 6s infinite;">60</td>

        <td style="animation: hi 6s infinite;">80</td>
        <td style="animation: hi 6s infinite;">90</td>
        <td style="animation: hi 6s infinite;">80</td>
      </tr>
      <br><br><br>

    </table>
   

  </center>

</body>
</marquee>

</html>
